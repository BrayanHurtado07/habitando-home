<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><title>scenes</title>
<script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
<style>
  body{margin:0;background:#e8e4dd;font-family:sans-serif}
  .row{display:grid;grid-template-columns:repeat(3,1fr)}
  .cell{position:relative;height:420px;border:1px solid #ccc}
  model-viewer{width:100%;height:100%;background:#efece6}
  .lbl{position:absolute;top:6px;left:8px;background:#1C1A17;color:#fff;font-size:13px;padding:2px 8px;border-radius:4px;z-index:2}
</style></head><body>
<div class="row" id="row"></div>
<script type="module">
  const scenes=[
    {src:'../assets/3d/escena_1cojin.glb',t:'1 cojín'},
    {src:'../assets/3d/escena_2cojines.glb',t:'2 cojines'},
    {src:'../assets/3d/escena_3cojines.glb',t:'3 mixtos'},
  ];
  const row=document.getElementById('row');
  scenes.forEach(s=>{
    const c=document.createElement('div');c.className='cell';c.innerHTML=`<span class="lbl">${s.t}</span>`;
    const mv=document.createElement('model-viewer');
    mv.setAttribute('src',s.src);
    mv.setAttribute('camera-orbit','35deg 80deg 105%');
    mv.setAttribute('environment-image','neutral');
    mv.setAttribute('exposure','1.05');mv.setAttribute('shadow-intensity','1.1');
    mv.setAttribute('interaction-prompt','none');
    c.appendChild(mv);row.appendChild(c);
  });
</script></body></html>

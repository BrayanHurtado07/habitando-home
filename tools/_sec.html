<!DOCTYPE html><html><head><meta charset="utf-8">
<script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
<style>body{margin:0;background:#F7F4EF}.r{display:flex;gap:10px;padding:10px}.c{position:relative;width:440px;height:330px;border-radius:24px;overflow:hidden;background:#E9E1D4}model-viewer{width:100%;height:100%;background:transparent}.l{position:absolute;top:6px;left:8px;background:#1C1A17;color:#fff;font-size:12px;padding:2px 8px;border-radius:4px;z-index:2}</style></head>
<body><div class="r" id="r"></div><script type="module">
const s=[{src:'../assets/3d/escena_2cojines.glb',t:'2 cojines'},{src:'../assets/3d/escena_3cojines.glb',t:'3 mixtos'}];
const r=document.getElementById('r');
s.forEach(x=>{const c=document.createElement('div');c.className='c';c.innerHTML=`<span class="l">${x.t}</span>`;
const m=document.createElement('model-viewer');m.setAttribute('src',x.src);m.setAttribute('camera-orbit','28deg 82deg 105%');m.setAttribute('environment-image','neutral');m.setAttribute('exposure','1.05');m.setAttribute('shadow-intensity','1.1');m.setAttribute('interaction-prompt','none');c.appendChild(m);r.appendChild(c);});
</script></body></html>
